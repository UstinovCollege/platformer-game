<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Платформер — Спринт 3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-overlay">
            <div id="score-display">⭐ 0</div>
            <div id="lives-display">❤️ 2</div>
            <button id="audio-toggle" class="ui-button">🔊</button>
        </div>
        
        <button id="restart-button">🔄 Рестарт</button>
        
        <div id="level-title">Уровень 1: Первые звёзды</div>
        
        <div id="game-over-screen" class="hidden">
            <h1>💀 GAME OVER 💀</h1>
            <p>Нажми R или кнопку рестарта</p>
        </div>
        <div id="win-screen" class="hidden">
            <h1>🎉 ПОБЕДА! 🎉</h1>
            <p>Нажми R или кнопку рестарта</p>
        </div>
    </div>
    
    <script src="js/player.js"></script>
    <script src="js/world.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
